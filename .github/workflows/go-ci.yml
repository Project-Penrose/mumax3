name: Go CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read
  security-events: write

jobs:
  test:
    name: Test
    runs-on: magnon-enterprise-runners
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2

      - name: Set up Go
        uses: actions/setup-go@7b8cf10d8d7a6f822cc2e6fa7db7a68e2e9b7b9f  # v5.6.0
        with:
          go-version-file: go.mod
          cache: true

      - name: Verify go.sum
        run: go mod verify

      - name: go vet
        run: go vet ./...

      - name: Test with race detector
        run: go test -v -race -count=1 -timeout=10m ./...

  govulncheck:
    name: govulncheck
    runs-on: magnon-enterprise-runners
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2

      - name: Set up Go
        uses: actions/setup-go@7b8cf10d8d7a6f822cc2e6fa7db7a68e2e9b7b9f  # v5.6.0
        with:
          go-version-file: go.mod
          cache: true

      - name: Install govulncheck
        run: go install golang.org/x/vuln/cmd/govulncheck@latest

      - name: Run govulncheck
        run: govulncheck ./...

  lint:
    name: Lint
    runs-on: magnon-enterprise-runners
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2

      - name: Set up Go
        uses: actions/setup-go@7b8cf10d8d7a6f822cc2e6fa7db7a68e2e9b7b9f  # v5.6.0
        with:
          go-version-file: go.mod
          cache: true

      - name: golangci-lint
        uses: golangci/golangci-lint-action@971e284b6050e8a5849b72094c50ab08da042db8  # v6.1.1
        with:
          version: latest
          args: --timeout=5m
